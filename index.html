<!doctype html>

<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Embed Vollbild</title>
  <style>
    html,body{height:100%;margin:0;padding:0;background:#000}
    iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
    .fallback{display:none;color:#fff;background:#000;padding:20px;text-align:center}
    .visible{display:block}
  </style>
</head>
<body>
  <iframe id="embed" src="https://77h9ikcyz61q.manus.space/" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-popups"></iframe>  <div id="fallback" class="fallback">
    <p>Die Seite konnte nicht eingebettet werden (möglicherweise blockiert durch X-Frame-Options oder Content-Security-Policy).</p>
    <p><a href="https://77h9ikcyz61q.manus.space/" target="_blank" rel="noopener">Seite in neuem Tab öffnen</a></p>
  </div>  <script>
    const iframe = document.getElementById('embed');
    const fallback = document.getElementById('fallback');
    let loaded = false;

    iframe.addEventListener('load', ()=>{ loaded = true; fallback.classList.remove('visible'); });
    setTimeout(()=>{ if(!loaded){ fallback.classList.add('visible'); } }, 1500);
  </script></body>
</html>
